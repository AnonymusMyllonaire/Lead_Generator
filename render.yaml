services:
  - type: web
    name: lead-generator-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: JWT_SECRET
        sync: false
      - key: POLAR_WEBHOOK_SECRET
        sync: false
      - key: DATABASE_PATH
        value: "./data/subscribers.db"
